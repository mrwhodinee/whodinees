    <script>
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');

        viewer.addEventListener('load', () => {
            status.innerHTML = '✅ <strong>Model loaded successfully!</strong>';
            status.style.background = '#c8e6c9';
        });

        viewer.addEventListener('error', (event) => {
            status.innerHTML = '❌ <strong>Error loading model:</strong> ' + event.detail.message;
            status.style.background = '#ffcdd2';
            console.error('Model viewer error:', event);
        });

        viewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress;
            status.innerHTML = `⏳ Loading... ${Math.round(progress * 100)}%`;
        });
