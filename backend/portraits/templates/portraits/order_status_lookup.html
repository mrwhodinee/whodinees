<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order - Whodinees</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.2s;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .results {
            margin-top: 30px;
            display: none;
        }
        .results.show {
            display: block;
        }
        .order-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .order-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #e3f2fd;
            color: #1976d2;
        }
        .order-info {
            color: #555;
            margin: 8px 0;
            font-size: 0.95rem;
        }
        .order-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-secondary {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            color: #c62828;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
        }
        .empty-state h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            display: none;
        }
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Track Your Order</h1>
        <p class="subtitle">Enter your email to view your order status</p>
        
        <form id="lookupForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="your@email.com"
                    autocomplete="email"
                />
            </div>
            <button type="submit" id="submitBtn">Find My Orders</button>
        </form>
        
        <div class="loading" id="loading">
            <p>🔄 Searching for your orders...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results"></div>
        
        <a href="https://whodinees.com" class="back-link">← Back to Whodinees</a>
    </div>
    
    <script>
        const form = document.getElementById('lookupForm');
        const results = document.getElementById('results');
        const error = document.getElementById('error');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            // Show loading
            loading.classList.add('show');
            results.classList.remove('show');
            error.classList.remove('show');
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/orders/find', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                loading.classList.remove('show');
                submitBtn.disabled = false;
                
                if (!response.ok) {
                    showError(data.error || 'Failed to find orders');
                    return;
                }
                
                displayResults(data.orders);
                
            } catch (err) {
                loading.classList.remove('show');
                submitBtn.disabled = false;
                showError('Network error. Please try again.');
                console.error(err);
            }
        });
        
        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
        }
        
        function displayResults(orders) {
            if (!orders || orders.length === 0) {
                results.innerHTML = `
                    <div class="empty-state">
                        <h3>No orders found</h3>
                        <p>We couldn't find any orders associated with this email address.</p>
                        <p style="margin-top: 10px;">Double-check your email or <a href="https://whodinees.com/portraits" style="color: #667eea;">create a new order</a>.</p>
                    </div>
                `;
                results.classList.add('show');
                return;
            }
            
            let html = '<h2 style="margin-bottom: 20px; color: #2c3e50;">Your Orders</h2>';
            
            orders.forEach(portrait => {
                portrait.orders.forEach(order => {
                    html += `
                        <div class="order-card">
                            <div class="order-header">
                                <div class="order-title">
                                    ${portrait.pet_name || portrait.pet_type} Figurine
                                </div>
                                <span class="status-badge">${order.status}</span>
                            </div>
                            <div class="order-info">
                                <strong>Material:</strong> ${order.material}<br>
                                <strong>Size:</strong> ${order.size_mm}mm<br>
                                <strong>Price:</strong> $${order.price.toFixed(2)}<br>
                                <strong>Ordered:</strong> ${new Date(order.created_at).toLocaleDateString()}
                                ${order.tracking_number ? `<br><strong>Tracking:</strong> ${order.tracking_number}` : ''}
                            </div>
                            <div class="order-actions">
                                <a href="/api/orders/${order.token}" class="btn-secondary">View Details</a>
                                ${order.has_invoice ? `<a href="/api/orders/${order.token}/invoice" class="btn-secondary">📄 Download Invoice</a>` : ''}
                                ${order.has_glb ? `<a href="/api/portraits/${portrait.token}/model" class="btn-secondary">📦 Download 3D Model</a>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
            
            results.innerHTML = html;
            results.classList.add('show');
        }
    </script>
</body>
</html>
