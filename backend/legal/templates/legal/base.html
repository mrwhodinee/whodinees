<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Whodinees{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: white;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        header .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
        }
        .content {
            padding: 20px 0;
        }
        h2 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        h3 {
            font-size: 1.3rem;
            color: #34495e;
            margin: 25px 0 10px;
        }
        p {
            margin: 15px 0;
            color: #555;
        }
        ul, ol {
            margin: 15px 0 15px 30px;
            color: #555;
        }
        li {
            margin: 8px 0;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-block;
            margin: 30px 0;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
        .back-link:hover {
            background: #2980b9;
            text-decoration: none;
        }
        footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
            text-align: center;
            color: #7f8c8d;
        }
        .effective-date {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{% block page_title %}Whodinees{% endblock %}</h1>
            <div class="subtitle">{% block subtitle %}Legal Information{% endblock %}</div>
        </header>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <footer>
            <a href="https://whodinees.com" class="back-link">← Back to Whodinees</a>
            <p>&copy; 2026 Mr. May Who LLC. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
